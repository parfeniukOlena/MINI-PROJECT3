<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <form class="custom-form"> 

        <h1>Налаштування аккаунту</h1> 
        <h3>Тема інтерфейсу</h3>










        <!-- Радіокнопки --> 





        <div class="radio-group">

                <label class="radio-label"> 

                    <input type="radio" name="frequency" class="radio-input" value="daily" 

                    /> 

                    <span class="radio-custom"></span> 

                    Світла

                </label> 



                <label class="radio-label"> 

                    <input type="radio" name="frequency" class="radio-input" 

                    value="weekly" checked /> 

                    <span class="radio-custom"></span> 

                    Темна 

                </label> 
        </div>

   

        <h3>EMAIL сповіщення</h3>

        <div class="switch-group">
            <span> Нові повідомлення в чаті </span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
    
        </div>
        <hr/>
        <div class="switch-group">
            <span> Щотижневий звіт успішності </span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
        </div>
        <hr/>

        <button type="submit">Зберегти</button> 

    </form>



</body>
</html>
